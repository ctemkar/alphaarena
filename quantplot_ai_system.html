<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpha Arena | Live AI Trading System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Monaco', monospace; background: #08090b; color: #00ff88; margin: 0; padding: 20px; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; height: 90vh; }
        .panel { border: 1px solid #1e222d; background: #111418; padding: 15px; display: flex; flex-direction: column; }
        .stat-bar { display: flex; gap: 20px; margin-bottom: 20px; background: #1a1e24; padding: 10px; border-radius: 4px; }
        .model-card { border-bottom: 1px solid #2d3139; padding: 10px 0; }
        .model-name { color: #f0b90b; font-weight: bold; }
        .pos-long { color: #00ff88; }
        .pos-short { color: #ff4d4d; }
        .log { overflow-y: auto; flex-grow: 1; font-size: 11px; color: #848e9c; }
        .chart-container { flex-grow: 1; min-height: 0; }
        h2 { color: #fff; margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <div class="stat-bar">
        <div>LIVE BTC: <span id="btc-price">--</span></div>
        <div>ACTIVE AGENTS: 4</div>
        <div>ARENA STATUS: <span style="color: #00ff88;">REAL-TIME EXECUTION</span></div>
    </div>

    <div class="grid">
        <div class="panel">
            <h2>Portfolio Performance (USD)</h2>
            <div class="chart-container">
                <canvas id="arenaChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <h2>Live Trade Logic</h2>
            <div id="model-stats"></div>
            <hr style="border:0; border-top:1px solid #2d3139; margin: 15px 0;">
            <div id="trade-log" class="log"></div>
        </div>
    </div>

    <script>
        const btcEl = document.getElementById('btc-price');
        const logEl = document.getElementById('trade-log');
        const statsEl = document.getElementById('model-stats');
        
        let currentBtcPrice = 0;
        
        const models = {
            'Qwen-3': { balance: 10000, pos: 0, entry: 0, color: '#00ff88', bias: 0.55 },
            'DeepSeek': { balance: 10000, pos: 0, entry: 0, color: '#00ccff', bias: 0.52 },
            'Claude-4': { balance: 10000, pos: 0, entry: 0, color: '#ff4d4d', bias: 0.48 },
            'GPT-5': { balance: 10000, pos: 0, entry: 0, color: '#f0b90b', bias: 0.45 }
        };

        const ctx = document.getElementById('arenaChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: Object.keys(models).map(m => ({
                label: m, borderColor: models[m].color, data: [], tension: 0.1, pointRadius: 0
            }))},
            options: { responsive: true, maintainAspectRatio: false, scales: { 
                y: { grid: { color: '#1e222d' }, ticks: { color: '#848e9c' } },
                x: { display: false }
            }}
        });

        function log(msg) {
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(div);
        }

        // Live Market Connection
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            currentBtcPrice = parseFloat(data.c);
            btcEl.innerText = `$${currentBtcPrice.toLocaleString()}`;
        };

        // Core Trading System Logic
        function runTradingLogic() {
            if (!currentBtcPrice) return;

            Object.keys(models).forEach((name, index) => {
                const m = models[name];
                
                // 1. Calculate Floating PnL if in position
                if (m.pos !== 0) {
                    const diff = (currentBtcPrice - m.entry) * m.pos;
                    m.balance += diff;
                    m.entry = currentBtcPrice; // Mark-to-market update
                }

                // 2. AI Decision Engine (Simulated Logic based on biases)
                // In a real system, this would be an API call to the LLM
                if (Math.random() > 0.95) { 
                    const action = Math.random() < m.bias ? 1 : -1;
                    m.pos = action * (m.balance / currentBtcPrice) * 0.5; // 0.5x leverage
                    m.entry = currentBtcPrice;
                    log(`<span style="color:${m.color}">${name}</span>: ENTERED ${action > 0 ? 'LONG' : 'SHORT'} @ ${currentBtcPrice}`);
                }

                // Update Chart
                chart.data.datasets[index].data.push(m.balance.toFixed(2));
            });

            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            if (chart.data.labels.length > 50) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(d => d.data.shift());
            }
            chart.update('none');

            // Render Sidebar Stats
            statsEl.innerHTML = Object.keys(models).map(name => `
                <div class="model-card">
                    <span class="model-name">${name}</span>: $${parseFloat(models[name].balance).toLocaleString()} 
                    <span class="${models[name].pos >= 0 ? 'pos-long' : 'pos-short'}">
                        (${models[name].pos !== 0 ? (models[name].pos > 0 ? 'LONG' : 'SHORT') : 'IDLE'})
                    </span>
                </div>
            `).join('');
        }

        // Run the "Thinking" cycle every 2 seconds
        setInterval(runTradingLogic, 2000);
    </script>
</body>
</html>
