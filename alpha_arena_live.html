<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpha Arena | Live Market Data</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #2b2f36; padding-bottom: 15px; }
        .live-indicator { color: #02c076; font-weight: bold; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: #02c076; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .card { background: #181a20; padding: 14px; border-radius: 8px; border: 1px solid #2b2f36; }
        .card h4 { margin: 0; color: #848e9c; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card .val { font-size: 20px; margin-top: 6px; font-weight: bold; }

        /* Two-section grid layout */
        .two-col { display: grid; grid-template-columns: 1fr 360px; gap: 16px; height: 500px; }
        .panel { background: #181a20; border: 1px solid #2b2f36; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .panel h3 { margin: 0 0 12px 0; font-size: 13px; color: #eaecef; }
        .chart-container { flex: 1; min-height: 0; position: relative; }
        .chart-note { color: #848e9c; font-size: 11px; margin-top: 8px; }

        /* Desk sections + controls */
        .controls { border: 1px solid #2b2f36; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #11151b; }
        .controls h4 { margin: 0 0 8px 0; font-size: 12px; color: #eaecef; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ctrl-row { display: flex; gap: 8px; margin-top: 8px; }
        input, select, button {
            background: #0f1318;
            color: #eaecef;
            border: 1px solid #2b2f36;
            border-radius: 6px;
            padding: 7px 8px;
            font-size: 12px;
        }
        button { cursor: pointer; }
        button:hover { border-color: #f0b90b; }
        .btn-add { color: #02c076; }
        .btn-remove { color: #f84960; }

        .desk-title { font-size: 12px; margin: 8px 0 6px 0; color: #f0b90b; text-transform: uppercase; letter-spacing: 0.6px; }
        .model-card { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
        .model-card:last-of-type { border-bottom: none; }
        .model-name { font-weight: 600; }
        .pos-long { color: #02c076; }
        .pos-short { color: #f84960; }
        .pos-idle { color: #848e9c; }
        .trade-log { margin-top: 10px; flex: 1; overflow-y: auto; font-size: 11px; color: #848e9c; }
        .trade-log div { padding: 2px 0; }

        /* Offline badge */
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-left: 8px; }
        .badge-live { background: #02c07622; color: #02c076; }
        .badge-sim  { background: #f0b90b22; color: #f0b90b; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0">Alpha Arena <span style="color:#f0b90b">Real-Time Feed</span></h2>
        <div class="live-indicator">
            <span class="dot"></span>
            <span id="feed-label">CONNECTING…</span>
            <span id="feed-badge" class="badge badge-sim">SIM</span>
        </div>
    </div>

    <!-- Section 1: KPI cards -->
    <div class="stats">
        <div class="card"><h4>Live BTC Price</h4><div id="btc-price" class="val">--</div></div>
        <div class="card"><h4>Best Desk PnL</h4><div id="pnl-val" class="val" style="color:#02c076">+$0.00</div></div>
        <div class="card"><h4>Active Models</h4><div id="active-models" class="val">4</div></div>
        <div class="card"><h4>Arena Status</h4><div class="val" style="color:#02c076;font-size:14px">RUNNING</div></div>
    </div>

    <!-- Section 2: Chart panel + Model stats panel -->
    <div class="two-col">
        <div class="panel">
            <h3>Desk Performance (USD)</h3>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
            <div class="chart-note">Two sections run in parallel: BTC-only desk and Basket desk.</div>
        </div>

        <div class="panel">
            <h3>LLM Selection & Desk Stats</h3>
            <div class="controls">
                <h4>Add / Remove LLM</h4>
                <div class="controls-grid">
                    <input id="llm-name-input" type="text" placeholder="LLM name (e.g., Llama-4)">
                    <select id="llm-desk-select">
                        <option value="btc">BTC-Only Desk</option>
                        <option value="basket">Basket Desk</option>
                    </select>
                </div>
                <div class="ctrl-row">
                    <button id="add-llm-btn" class="btn-add">+ Add LLM</button>
                    <select id="remove-llm-select" style="flex:1"></select>
                    <button id="remove-llm-btn" class="btn-remove">- Remove</button>
                </div>
            </div>
            <div id="model-stats"></div>
            <div class="trade-log" id="trade-log"></div>
        </div>
    </div>

    <script>
        const btcEl    = document.getElementById('btc-price');
        const pnlEl    = document.getElementById('pnl-val');
        const activeModelsEl = document.getElementById('active-models');
        const logEl    = document.getElementById('trade-log');
        const statsEl  = document.getElementById('model-stats');
        const feedLbl  = document.getElementById('feed-label');
        const feedBadge= document.getElementById('feed-badge');
        const llmNameInput = document.getElementById('llm-name-input');
        const llmDeskSelect = document.getElementById('llm-desk-select');
        const removeLlmSelect = document.getElementById('remove-llm-select');
        const addLlmBtn = document.getElementById('add-llm-btn');
        const removeLlmBtn = document.getElementById('remove-llm-btn');

        // ── Model state ──────────────────────────────────────────────
        const models = {
            'Qwen-3':    { balance: 10000, pos: 0, entry: 0, color: '#02c076', bias: 0.56, desk: 'btc' },
            'DeepSeek':  { balance: 10000, pos: 0, entry: 0, color: '#00ccff', bias: 0.52, desk: 'basket' },
            'Claude-4':  { balance: 10000, pos: 0, entry: 0, color: '#f84960', bias: 0.48, desk: 'btc' },
            'GPT-5':     { balance: 10000, pos: 0, entry: 0, color: '#f0b90b', bias: 0.45, desk: 'basket' }
        };

        const deskEquity = {
            btc: { history: [], current: 20000 },
            basket: { history: [], current: 20000 }
        };

        // ── Chart ─────────────────────────────────────────────────────
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'BTC-Only Desk',
                        borderColor: '#f0b90b',
                        backgroundColor: 'transparent',
                        data: [],
                        tension: 0.2,
                        pointRadius: 0,
                        borderWidth: 2
                    },
                    {
                        label: 'Basket Desk',
                        borderColor: '#00ccff',
                        backgroundColor: 'transparent',
                        data: [],
                        tension: 0.2,
                        pointRadius: 0,
                        borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: { legend: { labels: { color: '#848e9c', font: { size: 11 } } } },
                scales: {
                    x: { display: false },
                    y: {
                        grid: { color: '#2b2f36' },
                        ticks: { color: '#848e9c', callback: v => '$' + parseFloat(v).toLocaleString() }
                    }
                }
            }
        });

        // ── Seed chart with 20 flat points so it renders immediately ──
        for (let i = 0; i < 20; i++) {
            chart.data.labels.push('');
            chart.data.datasets[0].data.push(20000);
            chart.data.datasets[1].data.push(20000);
            deskEquity.btc.history.push(20000);
            deskEquity.basket.history.push(20000);
        }
        chart.update('none');

        // ── Helpers ───────────────────────────────────────────────────
        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(div);
            if (logEl.children.length > 40) logEl.lastChild.remove();
        }

        function randomColor() {
            const palette = ['#a7f432', '#39d2ff', '#ff7d4d', '#d58bff', '#ffd166', '#4ef0b8'];
            return palette[Math.floor(Math.random() * palette.length)];
        }

        function refreshRemoveDropdown() {
            const names = Object.keys(models);
            removeLlmSelect.innerHTML = names.map(name => {
                const deskLabel = models[name].desk === 'btc' ? 'BTC-Only' : 'Basket';
                return `<option value="${name}">${name} (${deskLabel})</option>`;
            }).join('');
        }

        function renderStats() {
            const names = Object.keys(models);
            const btcDeskPnl = deskEquity.btc.current - 20000;
            const basketDeskPnl = deskEquity.basket.current - 20000;
            const bestPnl = Math.max(btcDeskPnl, basketDeskPnl).toFixed(2);
            pnlEl.innerText = `${bestPnl >= 0 ? '+' : ''}$${parseFloat(bestPnl).toLocaleString()}`;
            pnlEl.style.color = bestPnl >= 0 ? '#02c076' : '#f84960';
            activeModelsEl.innerText = names.length;

            const btcRows = names.filter(name => models[name].desk === 'btc').map(name => {
                const m = models[name];
                const pnl = (m.balance - 10000).toFixed(2);
                const posClass = m.pos > 0 ? 'pos-long' : m.pos < 0 ? 'pos-short' : 'pos-idle';
                const posLabel = m.pos > 0 ? 'LONG' : m.pos < 0 ? 'SHORT' : 'IDLE';
                return `<div class="model-card">
                    <span class="model-name" style="color:${m.color}">${name}</span>
                    <span class="${posClass}">${posLabel}</span>
                    <span style="color:${pnl>=0?'#02c076':'#f84960'}">${pnl>=0?'+':''}$${parseFloat(pnl).toLocaleString()}</span>
                </div>`;
            }).join('') || `<div class="model-card"><span class="pos-idle">No LLMs selected</span></div>`;

            const basketRows = names.filter(name => models[name].desk === 'basket').map(name => {
                const m = models[name];
                const pnl = (m.balance - 10000).toFixed(2);
                const posClass = m.pos > 0 ? 'pos-long' : m.pos < 0 ? 'pos-short' : 'pos-idle';
                const posLabel = m.pos > 0 ? 'LONG' : m.pos < 0 ? 'SHORT' : 'IDLE';
                return `<div class="model-card">
                    <span class="model-name" style="color:${m.color}">${name}</span>
                    <span class="${posClass}">${posLabel}</span>
                    <span style="color:${pnl>=0?'#02c076':'#f84960'}">${pnl>=0?'+':''}$${parseFloat(pnl).toLocaleString()}</span>
                </div>`;
            }).join('') || `<div class="model-card"><span class="pos-idle">No LLMs selected</span></div>`;

            statsEl.innerHTML = `
                <div class="desk-title">BTC-Only Desk: $${deskEquity.btc.current.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                ${btcRows}
                <div class="desk-title">Basket Desk: $${deskEquity.basket.current.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                ${basketRows}
            `;

            refreshRemoveDropdown();
        }

        // ── Core trading tick ─────────────────────────────────────────
        function runTick(prices) {
            Object.keys(models).forEach((name) => {
                const m = models[name];
                const refPrice = m.desk === 'btc' ? prices.btc : prices.basket;
                if (m.pos !== 0) {
                    m.balance += (refPrice - m.entry) * m.pos;
                    m.entry = refPrice;
                }
                if (Math.random() > 0.94) {
                    const action = Math.random() < m.bias ? 1 : -1;
                    m.pos = action * (m.balance / refPrice) * 0.5;
                    m.entry = refPrice;
                    const deskLabel = m.desk === 'btc' ? 'BTC' : 'BASKET';
                    addLog(`<span style="color:${m.color}">${name}</span> [${deskLabel}]: ${action > 0 ? 'LONG' : 'SHORT'} @ $${refPrice.toLocaleString()}`);
                }
            });

            deskEquity.btc.current = Object.keys(models)
                .filter(name => models[name].desk === 'btc')
                .reduce((sum, name) => sum + models[name].balance, 0);
            deskEquity.basket.current = Object.keys(models)
                .filter(name => models[name].desk === 'basket')
                .reduce((sum, name) => sum + models[name].balance, 0);

            chart.data.datasets[0].data.push(parseFloat(deskEquity.btc.current.toFixed(2)));
            chart.data.datasets[1].data.push(parseFloat(deskEquity.basket.current.toFixed(2)));

            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            if (chart.data.labels.length > 60) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
            }
            chart.update('none');
            renderStats();
        }

        // ── Live WebSocket ────────────────────────────────────────────
        let prices = {
            btc: 84000,
            eth: 4200,
            sol: 170,
            bnb: 630,
            basket: 0
        };
        let wsConnected  = false;

        function recalcBasket() {
            prices.basket = (prices.btc + prices.eth * 12 + prices.sol * 300 + prices.bnb * 80) / 4;
        }

        recalcBasket();

        try {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
            ws.onopen = () => {
                wsConnected = true;
                feedLbl.innerText  = 'BINANCE LIVE: BTC/USDT';
                feedBadge.innerText = 'LIVE';
                feedBadge.className = 'badge badge-live';
            };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const nextBtc = parseFloat(data.c);
                const ret = (nextBtc - prices.btc) / prices.btc;
                prices.btc = nextBtc;

                // Correlated synthetic updates for basket components.
                prices.eth = prices.eth * (1 + ret * 0.85 + (Math.random() - 0.5) * 0.0012);
                prices.sol = prices.sol * (1 + ret * 1.25 + (Math.random() - 0.5) * 0.0025);
                prices.bnb = prices.bnb * (1 + ret * 0.65 + (Math.random() - 0.5) * 0.0010);
                recalcBasket();

                btcEl.innerText = `$${prices.btc.toLocaleString()}`;
            };
            ws.onerror = () => {
                feedLbl.innerText  = 'SIMULATION MODE';
            };
        } catch (e) {
            feedLbl.innerText = 'SIMULATION MODE';
        }

        // ── Simulation fallback (runs regardless — drives chart ticks) ─
        // When live, currentPrice is updated by WS; simulation adds small noise.
        function simStep() {
            if (!wsConnected) {
                prices.btc = prices.btc * (1 + (Math.random() - 0.5) * 0.0015);
                prices.eth = prices.eth * (1 + (Math.random() - 0.5) * 0.0020);
                prices.sol = prices.sol * (1 + (Math.random() - 0.5) * 0.0035);
                prices.bnb = prices.bnb * (1 + (Math.random() - 0.5) * 0.0015);
                recalcBasket();
                btcEl.innerText = `$${prices.btc.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            }
            runTick(prices);
        }

        function addLlm() {
            const rawName = llmNameInput.value.trim();
            if (!rawName) return;
            if (models[rawName]) {
                addLog(`<span style="color:#f0b90b">${rawName}</span> already exists in selection.`);
                return;
            }
            models[rawName] = {
                balance: 10000,
                pos: 0,
                entry: llmDeskSelect.value === 'btc' ? prices.btc : prices.basket,
                color: randomColor(),
                bias: 0.45 + Math.random() * 0.15,
                desk: llmDeskSelect.value
            };
            addLog(`<span style="color:${models[rawName].color}">${rawName}</span> added to ${models[rawName].desk === 'btc' ? 'BTC-Only' : 'Basket'} desk.`);
            llmNameInput.value = '';
            renderStats();
        }

        function removeLlm() {
            const name = removeLlmSelect.value;
            if (!name || !models[name]) return;
            delete models[name];
            addLog(`${name} removed from active selection.`);
            renderStats();
        }

        addLlmBtn.addEventListener('click', addLlm);
        removeLlmBtn.addEventListener('click', removeLlm);
        llmNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addLlm();
        });

        setInterval(simStep, 2000);
        renderStats();
    </script>
</body>
</html>
